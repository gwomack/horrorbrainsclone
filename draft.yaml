models:
  Post:
    title: string
    slug: string
    description: text
    release_date: date nullable
    rating: float
    is_published: boolean
    published_at: datetime nullable
    relationships:
      belongsToMany: Tag:&PostTag
      hasMany: PostRating, Embeds

  Embeds:
    embed: string
    type: enum:youtube,vimeo
    is_published: boolean
    published_at: datetime nullable
    relationships:
      belongsTo: Post

  Tag:
    name: string
    description: text nullable
    relationships:
      belongsToMany: Post:&PostTag
      hasMany: TagCustomField

  PostTag:
    post_id: id foreign:posts
    tag_id: id foreign:tags
    type: string

  TagCustomField:
    tag_id: id foreign:tags
    field: string
    value: text
    relationships:
      belongsTo: Tag

  PostRating:
    post_id: id foreign:posts
    rating: unsignedInteger
    user_id: id foreign:users nullable
    relationships:
      belongsTo: Post

seeders: Post, Tag, PostTag, PostRating
