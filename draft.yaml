models:

  Movie:
    title: string
    slug: string
    description: text
    release_date: date nullable
    rating: float
    is_published: boolean
    published_at: datetime nullable
    relationships:
      belongsToMany: Tag:&MovieTag
      hasMany: MovieRating, VideoEmbeds

  VideoEmbeds:
    url: string
    type: enum:youtube,vimeo
    is_published: boolean
    published_at: datetime nullable
    relationships:
      belongsTo: Movie

  Tag:
    name: string
    description: text nullable
    relationships:
      belongsToMany: Movie:&MovieTag

  MovieTag:
    movie_id: id foreign:movies
    tag_id: id foreign:tags
    type: string

  MovieRating:
    movie_id: id foreign:movies
    rating: unsignedInteger
    user_id: id foreign:users nullable
    relationships:
      belongsTo: Movie

seeders: Movie, Tag, MovieTag, MovieRating
